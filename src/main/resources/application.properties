# Spring Boot Application Configuration
spring.application.name=Smart Task Manager
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smart_task_manager_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.smarttaskmanager=DEBUG

# Server Configuration
server.servlet.context-path=/api
spring.mvc.static-path-pattern=/static/**