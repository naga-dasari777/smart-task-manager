<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager - Professional Task Management</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-tasks me-2"></i>Smart Task Manager
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-outline-light ms-2" id="darkModeToggle" title="Toggle Dark Mode">
                            <i class="fas fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid py-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title mb-4">
                            <i class="fas fa-filter me-2"></i>Filters
                        </h5>
                        
                        <!-- Add Task Button -->
                        <button class="btn btn-primary w-100 mb-3" id="addTaskBtn">
                            <i class="fas fa-plus me-2"></i>Add New Task
                        </button>

                        <!-- Statistics Section -->
                        <div class="mb-4">
                            <h6 class="text-muted mb-3">Statistics</h6>
                            <div id="statistics" class="d-flex flex-column gap-2">
                                <div class="stat-card">
                                    <small class="text-muted">Total Tasks</small>
                                    <h4 id="totalTasks">0</h4>
                                </div>
                                <div class="stat-card">
                                    <small class="text-muted">Completed</small>
                                    <h4 id="completedTasks">0</h4>
                                </div>
                                <div class="stat-card">
                                    <small class="text-muted">Pending</small>
                                    <h4 id="pendingTasks">0</h4>
                                </div>
                                <div class="progress mt-2" style="height: 5px;">
                                    <div id="completionBar" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                                </div>
                                <small class="text-muted text-center" id="completionPercentage">0% Complete</small>
                            </div>
                        </div>

                        <!-- Filter Section -->
                        <div class="mb-4">
                            <h6 class="text-muted mb-2">Filter by Status</h6>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="statusFilter" id="allStatus" value="all" checked>
                                <label class="btn btn-outline-secondary" for="allStatus">All</label>
                                
                                <input type="radio" class="btn-check" name="statusFilter" id="pendingStatus" value="PENDING">
                                <label class="btn btn-outline-secondary" for="pendingStatus">Pending</label>
                                
                                <input type="radio" class="btn-check" name="statusFilter" id="completedStatus" value="COMPLETED">
                                <label class="btn btn-outline-secondary" for="completedStatus">Done</label>
                            </div>
                        </div>

                        <!-- Priority Filter -->
                        <div>
                            <h6 class="text-muted mb-2">Filter by Priority</h6>
                            <select id="priorityFilter" class="form-select">
                                <option value="all">All Priorities</option>
                                <option value="HIGH">High Priority</option>
                                <option value="MEDIUM">Medium Priority</option>
                                <option value="LOW">Low Priority</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-9">
                <!-- Search Bar -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="fas fa-search text-muted"></i>
                            </span>
                            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search tasks by title or description...">
                            <button class="btn btn-outline-secondary" type="button" id="clearSearchBtn">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Loading Spinner -->
                <div id="loadingSpinner" class="text-center d-none mb-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="text-muted mt-2">Loading tasks...</p>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="text-center py-5 d-none">
                    <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                    <h5 class="text-muted">No tasks found</h5>
                    <p class="text-muted">Create your first task to get started!</p>
                </div>

                <!-- Tasks Container -->
                <div id="tasksContainer" class="row g-3">
                    <!-- Tasks will be loaded here dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Add New Task</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <div class="mb-3">
                            <label for="taskTitle" class="form-label">Task Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="taskTitle" placeholder="Enter task title" required>
                            <div class="invalid-feedback d-block" id="titleError"></div>
                        </div>

                        <div class="mb-3">
                            <label for="taskDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="taskDescription" rows="4" placeholder="Enter task description (optional)"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="taskPriority" class="form-label">Priority <span class="text-danger">*</span></label>
                                <select class="form-select" id="taskPriority" required>
                                    <option value="MEDIUM" selected>Medium</option>
                                    <option value="HIGH">High</option>
                                    <option value="LOW">Low</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="taskDueDate" class="form-label">Due Date</label>
                                <input type="datetime-local" class="form-control" id="taskDueDate">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveTaskBtn">
                        <i class="fas fa-save me-2"></i>Save Task
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS Files (utils first — api.js and app.js depend on it) -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
